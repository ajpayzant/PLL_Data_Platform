name: Update PLL Data Warehouse

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'   # Sunday midnight EST/EDT approximation in UTC
    - cron: '0 13 * * 5'  # Friday 8 AM EST/EDT approximation in UTC

permissions:
  contents: write

jobs:
  build-warehouse:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLL_BEARER_TOKEN: ${{ secrets.PLL_BEARER_TOKEN }}
      PLL_TARGET_SEASONS: '2022,2023,2024,2025,2026'
      PLL_COMPETITION_TYPE: regular
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build warehouse
        run: python scripts/build_warehouse.py

      - name: Commit updated data artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update PLL warehouse data
          file_pattern: data/**
