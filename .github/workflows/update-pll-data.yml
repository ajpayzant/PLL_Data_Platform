name: Update PLL Data Warehouse

on:
  workflow_dispatch:
  schedule:
    # Sunday midnight Eastern during daylight saving time = 04:00 UTC.
    - cron: "0 4 * * 0"
    # Friday 8:00 AM Eastern during daylight saving time = 12:00 UTC.
    - cron: "0 12 * * 5"

permissions:
  contents: write

jobs:
  update-pll-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PLL warehouse
        env:
          PLL_BEARER_TOKEN: ${{ secrets.PLL_BEARER_TOKEN }}
          PLL_TARGET_SEASONS: "2022,2023,2024,2025,2026"
          PLL_COMPETITION_TYPE: "regular"
          PLL_FORCE_RECOLLECT: "false"
          PLL_FORCE_REDISCOVER: "false"
        run: |
          python scripts/build_warehouse.py

      - name: Commit updated data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ || true

          if git diff --cached --quiet; then
            echo "No data artifact changes to commit."
          else
            git commit -m "Update PLL warehouse artifacts"
            git push
          fi
