name: Update PLL Data Warehouse

on:
  workflow_dispatch:
  schedule:
    # Sunday night at midnight Eastern time.
    # Implemented as Monday 00:00 America/New_York.
    - cron: "0 0 * * MON"
      timezone: America/New_York

    # Friday morning at 8:00 AM Eastern time.
    - cron: "0 8 * * FRI"
      timezone: America/New_York

permissions:
  contents: write

concurrency:
  group: pll-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PLL_PROJECT_ROOT: data
      PLL_TARGET_SEASONS: "2022,2023,2024,2025,2026"
      PLL_FORCE_RECOLLECT: "0"
      PLL_FORCE_REDISCOVER: "0"
      PLL_BEARER_TOKEN: ${{ secrets.PLL_BEARER_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PLL warehouse
        run: |
          python scripts/build_warehouse.py

      - name: Verify warehouse files
        run: |
          test -f data/analytics_database/pll_warehouse.duckdb
          test -f data/curated_data/all_requested_seasons/duckdb_table_index.csv
          ls -lh data/analytics_database/pll_warehouse.duckdb

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update PLL data warehouse"
            git push
          fi
